project:
  type: website
  output-dir: _site

format:
  html:
    theme:
      light: [cosmo, theme/etabli.scss]
      dark: [cosmo, theme/etabli-dark.scss]
    toc: true
    toc-depth: 2
    code-copy: true
    anchor-sections: true
    link-external-newwindow: true
    grid:
      body-width: 980px

website:
  title: "établi lattttice"
  reader-mode: true
  back-to-top-navigation: true
  navbar:
    pinned: true
    logo: assets/icon-lattttice.svg
    logo-href: index.html
    title: false
    right:
      - text: "EN"
        href: en/index.qmd
      - text: "FR"
        href: fr/index.qmd
      - text: "DE"
        href: de/index.qmd
      - text: "Download v0.1.0 (APK)"
        href: "https://github.com/etabli-dev/etabli-lattttice/releases/tag/v0.1.0"
      - icon: github
        href: "https://github.com/etabli-dev/etabli-lattttice"
  sidebar:
    - id: en
      title: "établi lattttice"
      style: floating
      contents:
        - section: "In English"
          contents:
            - text: "Walkthrough"
              href: en/index.qmd
    - id: fr
      title: "établi lattttice"
      style: floating
      contents:
        - section: "En français"
          contents:
            - text: "Visite guidée"
              href: fr/index.qmd
    - id: de
      title: "établi lattttice"
      style: floating
      contents:
        - section: "Auf Deutsch"
          contents:
            - text: "Rundgang"
              href: de/index.qmd
  page-footer:
    left: "Apache-2.0 · © 2026 R. Heller"
    right:
      - text: "établi suite"
        href: "https://github.com/etabli-dev"
